---
- name: Local Setup - Provision the single Docker-host VM
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Run tofu init
      ansible.builtin.command: tofu init
      args:
        chdir: terraform

    - name: Run tofu plan
      ansible.builtin.command: tofu plan -out=terraform.plan
      args:
        chdir: terraform

    - name: Run tofu apply
      ansible.builtin.command: tofu apply terraform.plan
      args:
        chdir: terraform

    - name: Get the VM public IP from Tofu output
      ansible.builtin.command: tofu output -raw vm_ip
      args:
        chdir: terraform
      register: vm_ip_output

    - name: Write hosts.yaml with the VM as the single host
      ansible.builtin.copy:
        dest: "hosts.yaml"
        content: |
          all:
            children:
              vm:
                hosts:
                  e2e-vm:
                    ansible_host: "{{ vm_ip_output.stdout }}"
            vars:
              ansible_python_interpreter: python3
              ansible_ssh_private_key_file: "/cache/ci-ssh-key"
              ansible_user: "root"
