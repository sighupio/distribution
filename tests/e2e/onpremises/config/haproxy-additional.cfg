frontend ingress-http
    mode tcp
    bind *:80
    default_backend ingress-http

backend ingress-http
    server worker0 10.10.1.9:31080 maxconn 256 check
    server worker1 10.10.1.10:31080 maxconn 256 check
    server worker2 10.10.1.11:31080 maxconn 256 check

frontend ingress-https
    mode tcp
    bind *:443
    default_backend ingress-https

backend ingress-https
    server worker0 10.10.1.9:31443 maxconn 256 check
    server worker1 10.10.1.10:31443 maxconn 256 check
    server worker2 10.10.1.11:31443 maxconn 256 check
