---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  labels:
    cluster.kfd.sighup.io/useful-link.enable: "true"
  annotations:
    cluster.kfd.sighup.io/useful-link.url: https://whisker.internal.example.com
    cluster.kfd.sighup.io/useful-link.name: "Calico Whisker UI"
    forecastle.stakater.com/expose: "true"
    forecastle.stakater.com/appName: "Calico Whisker UI"
    forecastle.stakater.com/icon: "https://docs.tigera.io/img/calico-logo-2026-black-text.svg"
    
    
    cert-manager.io/cluster-issuer: letsencrypt-fury
    

  name: whisker
  
  namespace: calico-system
  
spec:
  ingressClassName: 
  rules:
    - host: whisker.internal.example.com
      http:
        paths:
        - path: /
          pathType: Prefix
          backend:
          
            service:
              name: whisker
              port:
                number: 8081
          
  tls:
    - hosts:
      - whisker.internal.example.com
      secretName: whisker-tls
