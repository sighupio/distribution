[date_formats]
default_timezone = UTC
[auth]
signout_redirect_url = https://grafana.internal.example.com/.pomerium/sign_out
[auth.jwt]
enabled = true
header_name = X-Pomerium-Jwt-Assertion
email_claim = email
jwk_set_url = https://pomerium.example.com/.well-known/pomerium/jwks.json
cache_ttl = 60m
username_claim = sub
auto_sign_up = true
[users]
auto_assign_org = true
viewers_can_edit =  true
auto_assign_org_role = Viewer
