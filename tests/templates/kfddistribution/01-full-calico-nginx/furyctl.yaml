# This is a test case furyctl.yaml to assert that the distribution templates are generating the right output
---
apiVersion: kfd.sighup.io/v1alpha2
kind: KFDDistribution
metadata:
  name: full-calico-nginx
spec:
  distributionVersion: dummy # config based on v1.34.1, but we check against main
  distribution:
    kubeconfig: path/to/kubeconfig
    modules:
      networking:
        type: calico
      ingress:
        baseDomain: internal.example.com
        nginx:
          type: dual
          tls:
            provider: secret
            secret:
              cert: "cert.pem"
              key: "key.pem"
              ca: "ca.pem"
        haproxy:
          type: none
        certManager:
          clusterIssuer:
            name: letsencrypt-fury
            email: example@sighup.io
            type: http01
      logging:
        type: loki
        minio:
          storageSize: "20Gi"
      monitoring:
        type: mimir
        prometheus:
          retentionTime: "15d"
        mimir:
          externalEndpoint:
            bucketName: dummy
            accessKeyId: secret
            secretAccessKey: secret
            endpoint: s3.example.com
      tracing:
        type: tempo
        minio:
          storageSize: "20Gi"
      policy:
        type: gatekeeper
        gatekeeper:
          additionalExcludedNamespaces: ["dummy"]
          installDefaultPolicies: true
          enforcementAction: deny
      dr:
        type: on-premises
        velero: {}
      auth:
        provider:
          type: sso
        baseDomain: example.com
        pomerium:
          secrets:
            COOKIE_SECRET: dummy_cookie
            IDP_CLIENT_SECRET: dummy_idp
            SHARED_SECRET: dummy_shared
            SIGNING_KEY: dummy_signing
        dex:
          connectors:
            - type: oidc
              id: oidc
              name: OIDC
              config:
                clientID: client-id
                clientSecret: client-secret
                issuer: https://dex.example.com
    customPatches:
      patches:
        - path: dummy/folder
