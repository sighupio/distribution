---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../../vendor/modules/tracing/katalog/tempo-distributed
  - ../../../vendor/modules/tracing/katalog/minio-ha



patches:
  - path: patches/infra-nodes.yml
  - path: patches/minio.yml

configMapGenerator:
  - name: tempo-distributed-config
    namespace: tracing
    behavior: merge
    files:
      - patches/tempo.yaml
secretGenerator:
  - name: minio-tracing
    namespace: tracing
    behavior: replace
    envs:
      - patches/minio.root.env
