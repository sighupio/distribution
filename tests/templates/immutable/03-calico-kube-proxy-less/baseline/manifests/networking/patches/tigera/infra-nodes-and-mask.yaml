apiVersion: operator.tigera.io/v1
kind: Installation
metadata:
  name: default
spec:
  controlPlaneNodeSelector:
    null
  controlPlaneTolerations:
    null
  typhaDeployment:
    spec:
      template:
        spec:
          nodeSelector:
            null
          tolerations:
            null
  
  calicoNetwork:
    ipPools:
      - blockSize: 26
        cidr: 10.32.0.0/18
        name: default-ipv4-ippool
  

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tigera-operator
  namespace: tigera-operator
spec:
  template:
    spec:
      nodeSelector:
        null
      tolerations:
        null
