# This is a test case furyctl.yaml to assert that the distribution templates are generating the right output
# This test verifies output when no modules are enabled
---
apiVersion: kfd.sighup.io/v1alpha2
kind: Immutable
metadata:
  name: no-modules-enabled
spec:
  distributionVersion: v1.35.0
  infrastructure:
    ssh:
      username: core
      privateKeyPath: dummy
    nodes:
      - hostname: dummy.example.com
        macAddress: aa:bb:cc:dd:ee:ff
        storage:
          installDisk: /dev/sda
        network:
          ethernets:
            eth0:
              dhcp4: true
  kubernetes:
    pkiPath: ./pki
    networking:
      podCIDR: 10.32.0.0/18
      serviceCIDR: 10.96.0.0/16
    controlPlane:
      address: cp1.exmaple.com:6443
      members:
        - hostname: cp1.example.com
    nodeGroups: []
  distribution:
    modules:
      networking:
        type: cilium
        cilium:
          podCidr: "172.16.0.0/16"
          maskSize: "24"
      ingress:
        baseDomain: internal.example.com
        nginx:
          type: none
        haproxy:
          type: dual
          tls:
            provider: certManager
        certManager:
          clusterIssuer:
            name: letsencrypt-fury
            email: example@sighup.io
            type: http01
      logging:
        type: loki
        minio:
          storageSize: "20Gi"
      monitoring:
        type: prometheus
      tracing:
        type: none
        minio:
          storageSize: "20Gi"
      policy:
        type: kyverno
        kyverno:
          additionalExcludedNamespaces: ["dummy"]
          installDefaultPolicies: true
          validationFailureAction: Enforce
      dr:
        type: on-premises
        velero: {}
      auth:
        provider:
          type: none
          # We can't test basicAuth because the `htpasswd` hashing functions has
          # a random salt and the value changes every time we render the template.
          # type: basicAuth
          # basicAuth:
          #   username: admin
          #   password: admin
        baseDomain: example.com
    customPatches:
      patches:
        - path: dummy/folder
