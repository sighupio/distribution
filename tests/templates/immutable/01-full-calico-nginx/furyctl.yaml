# This is a test case furyctl.yaml to assert that the distribution templates are generating the right output
# This test verifies output when no modules are enabled
---
apiVersion: kfd.sighup.io/v1alpha2
kind: Immutable
metadata:
  name: no-modules-enabled
spec:
  distributionVersion: v1.35.0
  infrastructure:
    ssh:
      username: core
      privateKeyPath: dummy
    nodes:
      - hostname: dummy.example.com
        macAddress: aa:bb:cc:dd:ee:ff
        storage:
          installDisk: /dev/sda
        network:
          ethernets:
            eth0:
              dhcp4: true
  kubernetes:
    pkiPath: ./pki
    networking:
      podCIDR: 10.32.0.0/18
      serviceCIDR: 10.96.0.0/16
    controlPlane:
      address: cp1.exmaple.com:6443
      members:
        - hostname: cp1.example.com
    nodeGroups: []
  distribution:
    common:
      nodeSelector:
        node.kubernetes.io/role: infra
      tolerations:
        - effect: NoSchedule
          key: node.kubernetes.io/role
          value: infra
    modules:
      networking:
        type: calico
      ingress:
        baseDomain: internal.example.com
        nginx:
          type: dual
          tls:
            provider: secret
            secret:
              cert: "cert.pem"
              key: "key.pem"
              ca: "ca.pem"
        haproxy:
          type: none
        certManager:
          clusterIssuer:
            name: letsencrypt-fury
            email: example@sighup.io
            type: http01
      logging:
        type: loki
        minio:
          storageSize: "20Gi"
      monitoring:
        type: mimir
        prometheus:
          retentionTime: "15d"
        mimir:
          externalEndpoint:
            bucketName: dummy
            accessKeyId: secret
            secretAccessKey: secret
            endpoint: s3.example.com
      tracing:
        type: tempo
        minio:
          storageSize: "20Gi"
      policy:
        type: gatekeeper
        gatekeeper:
          additionalExcludedNamespaces: ["dummy"]
          installDefaultPolicies: true
          enforcementAction: deny
      dr:
        type: on-premises
        velero: {}
      auth:
        provider:
          type: sso
        baseDomain: example.com
        oidcKubernetesAuth:
          enabled: true
          clientID: dummy-oidc-client-id
          clientSecret: dummy-oidc-client-secret
          sessionSecurityKey: dummy-oidc-session-key
        pomerium:
          secrets:
            COOKIE_SECRET: dummy_cookie
            IDP_CLIENT_SECRET: dummy_idp
            SHARED_SECRET: dummy_shared
            SIGNING_KEY: dummy_signing
        dex:
          connectors:
            - type: oidc
              id: oidc
              name: OIDC
              config:
                clientID: client-id
                clientSecret: client-secret
                issuer: https://dex.example.com
    customPatches:
      patches:
        - path: dummy/folder
