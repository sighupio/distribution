---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  namespace: kube-system
  name: cilium
spec:
  template:
    spec:
      initContainers:
        - name: config
          env:
            - name: KUBERNETES_SERVICE_HOST
              value: "cp1.exmaple.com"
            - name: KUBERNETES_SERVICE_PORT
              value: "6443"
        - name: clean-cilium-state
          env:
            - name: KUBERNETES_SERVICE_HOST
              value: "cp1.exmaple.com"
            - name: KUBERNETES_SERVICE_PORT
              value: "6443"
      containers:
        - name: cilium-agent
          env:
            - name: KUBERNETES_SERVICE_HOST
              value: "cp1.exmaple.com"
            - name: KUBERNETES_SERVICE_PORT
              value: "6443"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cilium-operator
  namespace: kube-system
spec:
  template:
    spec:
      containers:
        - name: cilium-operator
          env:
            - name: KUBERNETES_SERVICE_HOST
              value: "cp1.exmaple.com"
            - name: KUBERNETES_SERVICE_PORT
              value: "6443"
