---
apiVersion: monitoring.coreos.com/v1
kind: Prometheus
metadata:
  name: k8s
  namespace: monitoring
spec:
  externalLabels:
    k8s_cluster: full-calico-nginx
  externalUrl: https://prometheus.internal.example.com
  retention: 15d
  retentionSize: 120GB
  storage:
    volumeClaimTemplate:
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 150Gi
