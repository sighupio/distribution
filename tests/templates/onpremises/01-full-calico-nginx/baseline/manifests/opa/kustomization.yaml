---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../../vendor/modules/opa/katalog/gatekeeper/core
  - ../../../vendor/modules/opa/katalog/gatekeeper/gpm
  - ../../../vendor/modules/opa/katalog/gatekeeper/rules
  - ../../../vendor/modules/opa/katalog/gatekeeper/monitoring
  - resources/ingress-infra.yml

patches:
  - path: patches/infra-nodes.yml
  - path: patches/gatekeeper-kapp-ordering.yml
  - patch: |-
      - op: replace
        path: /spec/enforcementAction
        value: deny
    target:
      group: constraints.gatekeeper.sh
  - target:
      group: config.gatekeeper.sh
      version: v1alpha1
      kind: Config
      name: config
    path: patches/gatekeeper-whitelist-namespace.yml
