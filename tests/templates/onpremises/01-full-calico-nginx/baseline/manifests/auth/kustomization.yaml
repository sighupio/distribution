---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../../vendor/modules/auth/katalog/dex
  - ../../../vendor/modules/auth/katalog/pomerium
  - ../../../vendor/modules/auth/katalog/gangplank
  - resources/ingress-infra.yml


patches:
  - path: patches/infra-nodes.yml
  - path: patches/pomerium-ingress.yml
configMapGenerator:
  - name: pomerium
    behavior: replace
    envs:
      - resources/pomerium-config.env
  - name: pomerium-policy
    behavior: replace
    files:
      - policy.yml=resources/pomerium-policy.yml

secretGenerator:
  - name: dex
    namespace: kube-system
    files:
      - config.yml=secrets/dex.yml
  - name: pomerium-env
    behavior: replace
    envs:
      - secrets/pomerium.env
  - name: gangplank
    namespace: kube-system
    files:
      - gangplank.yml=secrets/gangplank.yml


