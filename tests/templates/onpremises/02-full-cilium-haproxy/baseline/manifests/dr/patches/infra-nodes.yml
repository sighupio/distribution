apiVersion: apps/v1
kind: Deployment
metadata:
  name: velero
  namespace: kube-system
spec:
  template:
    spec:
      nodeSelector:
        null
      tolerations:
        null
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: node-agent
  namespace: kube-system
spec:
  template:
    spec:
      tolerations:
        null
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: minio
  namespace: kube-system
spec:
  template:
    spec:
      nodeSelector:
        null
      tolerations:
        null

---
apiVersion: batch/v1
kind: Job
metadata:
  name: minio-setup
  namespace: kube-system
spec:
  template:
    spec:
      nodeSelector:
        null
      tolerations:
        null