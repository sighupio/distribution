apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-fury
spec:
  acme:
    email: example@sighup.io
    privateKeySecretRef:
      name: letsencrypt-fury
    server: https://acme-v02.api.letsencrypt.org/directory
    solvers:
    - http01:
        ingress:
          class: haproxy-external
          podTemplate:
            metadata:
              labels:
                app: cert-manager
            spec:
              nodeSelector:
                {}
              tolerations:
                []