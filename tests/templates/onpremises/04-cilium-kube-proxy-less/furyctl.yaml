# This is a test case furyctl.yaml to assert that the distribution templates are generating the right output
# This test verifies output when no modules are enabled
---
apiVersion: kfd.sighup.io/v1alpha2
kind: OnPremises
metadata:
  name: no-kube-proxy
spec:
  distributionVersion: dummy # config based on v1.34.1, but we check against main
  kubernetes:
    advanced:
      kubeProxy:
        type: none
    pkiFolder: dummy
    ssh:
      username: dummy
      keyPath: dummy
    dnsZone: example.com
    controlPlaneAddress: api.example.com
    podCidr: 10.0.0.0/16
    svcCidr: 10.1.0.0/16
    loadBalancers:
      enabled: false
    masters:
      hosts:
        - name: master
          ip: 10.0.0.1
    nodes:
      - name: nodes
        hosts:
          - name: node
            ip: 10.0.0.2
  distribution:
    modules:
      networking:
        type: cilium
      ingress:
        baseDomain: internal.example.com
        nginx:
          type: none
        haproxy:
          type: none
          tls:
            provider: certManager
        certManager:
          clusterIssuer:
            name: letsencrypt-fury
            email: example@sighup.io
            type: http01
      logging:
        type: none
        minio:
          storageSize: "20Gi"
      monitoring:
        type: prometheus
      tracing:
        type: none
      policy:
        type: none
      dr:
        type: none
      auth:
        provider:
          type: none
