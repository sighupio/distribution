apiVersion: operator.tigera.io/v1
kind: Installation
metadata:
  name: default
spec:
  controlPlaneNodeSelector:
    node.kubernetes.io/role: infra
  controlPlaneTolerations:
    - effect: NoSchedule
      key: node.kubernetes.io/role
      value: infra
  typhaDeployment:
    spec:
      template:
        spec:
          nodeSelector:
            node.kubernetes.io/role: infra
          tolerations:
            - effect: NoSchedule
              key: node.kubernetes.io/role
              value: infra

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tigera-operator
  namespace: tigera-operator
spec:
  template:
    spec:
      nodeSelector:
        node.kubernetes.io/role: infra
      tolerations:
        - effect: NoSchedule
          key: node.kubernetes.io/role
          value: infra
