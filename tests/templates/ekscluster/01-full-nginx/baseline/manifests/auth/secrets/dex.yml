issuer: https://login.example.com
frontend:
  dir: /app/web
  theme: dark
storage:
  type: kubernetes
  config:
    inCluster: true
web:
  http: 0.0.0.0:5556
telemetry:
  http: 0.0.0.0:5558
connectors:
  - config:
      clientID: client-id
      clientSecret: client-secret
      issuer: https://dex.example.com
    id: oidc
    name: OIDC
    type: oidc
oauth2:
  skipApprovalScreen: true
enablePasswordDB: false
staticClients:
- id: pomerium
  redirectURIs:
  - https://pomerium.example.com/oauth2/callback
  name: 'Pomerium in-cluster SSO'
  secret: dummy_idp
expiry:
  signingKeys: 6h
  idTokens: 24h
