apiVersion: operator.tigera.io/v1
kind: Installation
metadata:
  name: default
spec:
  controlPlaneNodeSelector:
    node.kubernetes.io/role: infra
  controlPlaneTolerations:
    - effect: NoExecute
      key: dummyKey
      operator: Equal
      value: dummyValue
  typhaDeployment:
    spec:
      template:
        spec:
          nodeSelector:
            node.kubernetes.io/role: infra
          tolerations:
            - effect: NoExecute
              key: dummyKey
              operator: Equal
              value: dummyValue

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tigera-operator
  namespace: tigera-operator
spec:
  template:
    spec:
      nodeSelector:
        node.kubernetes.io/role: infra
      tolerations:
        - effect: NoExecute
          key: dummyKey
          operator: Equal
          value: dummyValue
