# This is a test case furyctl.yaml to assert that the distribution templates are generating the right output
---
apiVersion: kfd.sighup.io/v1alpha2
kind: EKSCluster
metadata:
  name: full-cilium-haproxy
spec:
  toolsConfiguration:
    opentofu:
      state:
        s3:
          bucketName: dummybucket
          keyPrefix: dummy_keyPrefix
          region: eu-central-1
  region: eu-west-1
  distributionVersion: v1.34.1 # config based on v1.34.1, but we check against main anyways
  infrastructure:
    vpc:
      network:
        cidr: 10.1.0.0/16
        subnetsCidrs:
          private:
            - 10.1.0.0/20
            - 10.1.16.0/20
            - 10.1.32.0/20
          public:
            - 10.1.48.0/24
            - 10.1.49.0/24
  kubernetes:
    nodeAllowedSshPublicKey: "ssh-ed25519 XYZ"
    nodePoolsLaunchKind: "launch_templates"
    nodePoolGlobalAmiType: "alinux2023"
    apiServer:
      privateAccess: true
      publicAccess: false
      privateAccessCidrs: ["0.0.0.0/0"]
      publicAccessCidrs: ["0.0.0.0/0"]
    nodePools:
      - name: infra
        type: self-managed
        size:
          min: 1
          max: 3
        instance:
          type: t3.xlarge
          spot: false
          volumeSize: 50
          volumeType: gp2
        labels:
          nodepool: infra
          node.kubernetes.io/role: infra
        taints:
          - node.kubernetes.io/role=infra:NoSchedule
        tags:
          k8s.io/cluster-autoscaler/node-template/label/nodepool: "infra"
          k8s.io/cluster-autoscaler/node-template/label/node.kubernetes.io/role: "infra"
    awsAuth: {}
  distribution:
    modules:
      networking: {}
      ingress:
        baseDomain: internal.example.com
        nginx:
          type: none
        haproxy:
          type: dual
          tls:
            provider: certManager
        certManager:
          clusterIssuer:
            name: letsencrypt-fury
            email: example@sighup.io
            type: http01
      logging:
        type: loki
        minio:
          storageSize: "20Gi"
      monitoring:
        type: prometheus
      tracing:
        type: none
        minio:
          storageSize: "20Gi"
      policy:
        type: kyverno
        kyverno:
          additionalExcludedNamespaces: ["dummy"]
          installDefaultPolicies: true
          validationFailureAction: Enforce
      dr:
        type: eks
        velero:
          eks:
            bucketName: example-velero
            region: eu-west-1
      auth:
        provider:
          type: none
          # We can't test basicAuth because the `htpasswd` hashing functions has
          # a random salt and the value changes every time we render the template.
          # type: basicAuth
          # basicAuth:
          #   username: admin
          #   password: admin
        baseDomain: example.com
    customPatches:
      patches:
        - path: dummy/folder
