# Tests the following cases:

# Given a valid Immutable provider configuration
# With dedicated etcd nodes (external etcd)
# When I validate the config against the schema
# Then no errors are returned

---
apiVersion: kfd.sighup.io/v1alpha2
kind: Immutable
metadata:
  name: test-cluster-external-etcd
spec:
  distributionVersion: v1.33.1

  infrastructure:
    matchbox:
      url: https://matchbox.prod.example.com:8080

    nodes:
      controlPlanes:
        - hostname: master1.prod.example.com
          macAddress: "52:54:00:aa:bb:10"
          installDisk: /dev/sda
          networkInterfaces:
            - name: ens3
              dhcp: false
              addresses: ["10.0.1.20/24"]
              gateway: 10.0.1.1

      workers:
        - hostname: worker1.prod.example.com
          macAddress: "52:54:00:aa:bb:20"
          installDisk: /dev/sda
          networkInterfaces:
            - name: ens3
              dhcp: false
              addresses: ["10.0.1.30/24"]
              gateway: 10.0.1.1

      etcds:
        - hostname: etcd1.prod.example.com
          macAddress: "52:54:00:aa:bb:30"
          installDisk: /dev/sdb
          networkInterfaces:
            - name: ens3
              dhcp: false
              addresses: ["10.0.1.40/24"]
              gateway: 10.0.1.1

        - hostname: etcd2.prod.example.com
          macAddress: "52:54:00:aa:bb:31"
          installDisk: /dev/sdb
          networkInterfaces:
            - name: ens3
              dhcp: false
              addresses: ["10.0.1.41/24"]
              gateway: 10.0.1.1

        - hostname: etcd3.prod.example.com
          macAddress: "52:54:00:aa:bb:32"
          installDisk: /dev/sdb
          networkInterfaces:
            - name: ens3
              dhcp: false
              addresses: ["10.0.1.42/24"]
              gateway: 10.0.1.1

    ssh:
      keyPath: ~/.ssh/id_ed25519

  kubernetes:
    controlPlaneAddress: k8s-api.prod.example.com
    controlPlanePort: 6443

    controlPlanes:
      - hostname: master1.prod.example.com
        ip: 10.0.1.20

    workers:
      - hostname: worker1.prod.example.com
        ip: 10.0.1.30

    etcds:
      - hostname: etcd1.prod.example.com
        ip: 10.0.1.40
      - hostname: etcd2.prod.example.com
        ip: 10.0.1.41
      - hostname: etcd3.prod.example.com
        ip: 10.0.1.42
