# Tests the following cases:
#
# Given an Immutable provider configuration
# With invalid CIDR (subnet mask /99)
# When I validate the config against the schema
# Then validation errors are returned

---
apiVersion: kfd.sighup.io/v1alpha2
kind: Immutable
metadata:
  name: test-cluster
spec:
  distributionVersion: v1.33.1

  infrastructure:
    matchbox:
      url: https://matchbox.internal.example.com:8080

    nodes:
      controlPlanes:
        - hostname: master1.prod.example.com
          macAddress: "52:54:00:aa:bb:10"
          installDisk: /dev/sda
          networkInterfaces:
            - name: ens3
              dhcp: false
              addresses: ["10.0.1.20/99"]  # INVALID: subnet mask > 32
              gateway: 10.0.1.1

      workers:
        - hostname: worker1.prod.example.com
          macAddress: "52:54:00:aa:bb:20"
          installDisk: /dev/sda
          networkInterfaces:
            - name: ens3
              dhcp: false
              addresses: ["10.0.1.30/24"]
              gateway: 10.0.1.1

    ssh:
      keyPath: ~/.ssh/id_ed25519

  kubernetes:
    controlPlaneAddress: k8s-api.prod.example.com

    controlPlanes:
      - hostname: master1.prod.example.com
        ip: 10.0.1.20

    workers:
      - hostname: worker1.prod.example.com
        ip: 10.0.1.30
